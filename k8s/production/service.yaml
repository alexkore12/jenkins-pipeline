---
# Kubernetes Service - Production
apiVersion: v1
kind: Service
metadata:
  name: app-production
  namespace: production
  labels:
    app: app
    env: production
  annotations:
    prometheus.io/scrape: "true"
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    app: app
    env: production
---
# Ingress - Production
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app-production
  namespace: production
  labels:
    app: app
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/rate-limit: "200"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  tls:
    - hosts:
        - api.example.com
      secretName: app-production-tls
  rules:
    - host: api.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: app-production
                port:
                  number: 80
---
# Horizontal Pod Autoscaler - Production
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: app-production
  namespace: production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: app-production
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Pods
          value: 2
          periodSeconds: 15
      selectPolicy: Max
---
# PodDisruptionBudget - Production
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: app-production
  namespace: production
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: app
      env: production
