# Jenkins Pipeline CI/CD Workflow

name: Pipeline Validation

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  validate-jenkinsfile:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate Jenkinsfile exists
        run: |
          if [ -f Jenkinsfile ]; then
            echo "✓ Jenkinsfile exists"
          else
            echo "✗ Jenkinsfile missing"
            exit 1
          fi

      - name: Check Jenkinsfile structure
        run: |
          echo "Checking Jenkinsfile structure..."
          
          grep -q "pipeline" Jenkinsfile && echo "✓ Contains pipeline declaration"
          grep -q "stages" Jenkinsfile && echo "✓ Contains stages block"
          grep -q "agent" Jenkinsfile && echo "✓ Contains agent directive"
          
          # Count stages
          stages=$(grep -c "stage(" Jenkinsfile || echo "0")
          echo "Stages found: $stages"

  security-scan:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Grype for dependencies
        uses: anchore/scan-action@v3
        with:
          scannerversion: latest
          severity-cutoff: high
          fail-build: false

  lint:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run shellcheck on Jenkinsfile
        uses: ludeeus/action-shellcheck@master
        env:
          SHELLCHECK_OPTS: -s groovy

  documentation:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check documentation
        run: |
          echo "Checking documentation..."
          
          [ -f README.md ] && echo "✓ README.md exists" || echo "✗ README.md missing"
          [ -f PIPELINE_GUIDE.md ] && echo "✓ PIPELINE_GUIDE.md exists" || echo "⚠️ No pipeline guide"
          [ -f SECURITY.md ] && echo "✓ SECURITY.md exists" || echo "⚠️ No security docs"
          
          # Check for key sections in README
          grep -q "stage" README.md && echo "✓ Documents stages"
